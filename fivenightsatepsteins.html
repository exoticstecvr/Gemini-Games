<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/fnae@afd4e5071add297d6169665a4f999d62f312532e/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Gemini System | FNAE Port</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Gemini Loading Text */
        .gemini-header {
            font-size: 18px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ffffff;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        }

        /* Sleek Grey Progress Bar */
        .progress-wrapper {
            width: 300px;
            padding: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            border: 1px solid #333;
        }

        #custom-progress-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #444, #bbb);
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
            transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        .stats-text {
            margin-top: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #666;
            letter-spacing: 1px;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            display: none;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="gemini-header">Gemini Processing...</div>
        <div class="progress-wrapper">
            <div id="custom-progress-bar"></div>
        </div>
        <div id="loading-stats" class="stats-text">ESTABLISHING CONNECTION [0.00 MB]</div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script>
        const loadingOverlay = document.querySelector("#loading-overlay");
        const loadingStats = document.querySelector("#loading-stats");
        const customBar = document.querySelector("#custom-progress-bar");
        const unityContainer = document.querySelector("#unity-container");
        
        let loadedBytes = 0;
        const totalMbConst = 139.53;

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                
                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                let percentage = ((mbDone / totalMbConst) * 100).toFixed(0);
                
                loadingStats.textContent = `SYNCING DATA: ${mbDone} MB / ${totalMbConst} MB`;
                customBar.style.width = `${Math.min(percentage, 100)}%`;
                
                chunks.push(value);
            }
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(fileParts) {
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            return URL.createObjectURL(new Blob(buffers));
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) { parts.push(file + ".part" + i); }
            return parts;
        }

        (async () => {
            // Downloading segments
            const [dataUrl, wasmUrl, webm] = await Promise.all([
                mergeFiles(getParts("Build/fnae.data", 1, 3)),
                mergeFiles(getParts("Build/fnae.wasm", 1, 2)),
                mergeFiles(getParts("StreamingAssets/202512191935.webm", 1, 3)),
            ]);

            // Video format patch
            window.randomwebm = webm;
            const realSrc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, "src");
            Object.defineProperty(HTMLMediaElement.prototype, "src", {
                set(value) {
                    if (typeof value === "string" && value.includes("202512191935.mp4")) {
                        value = window.randomwebm;
                    }
                    return realSrc.set.call(this, value);
                },
                get() { return realSrc.get.call(this); }
            });

            var canvas = document.querySelector("#unity-canvas");
            var config = {
                dataUrl: dataUrl,
                frameworkUrl: "Build/fnae.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "fnae",
                productVersion: "1.0",
            };

            var script = document.createElement("script");
            script.src = "Build/fnae.loader.js";
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    loadingStats.textContent = "OPTIMIZING ENGINE: " + (progress * 100).toFixed(0) + "%";
                }).then((unityInstance) => {
                    loadingOverlay.style.opacity = "0";
                    setTimeout(() => {
                        loadingOverlay.style.display = "none";
                        unityContainer.style.display = "block";
                    }, 500);
                }).catch((message) => {
                    alert("Initialization error: " + message);
                });
            };
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
