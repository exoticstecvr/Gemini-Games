<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Gemini System | Baldi's Basics</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- Gemini Loading Overlay (FNAE Look) --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease-in-out;
        }

        .gemini-header {
            font-size: 18px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ffffff;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        }

        .progress-wrapper {
            width: 300px;
            padding: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            border: 1px solid #333;
        }

        #custom-progress-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #444, #bbb);
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
            transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        .stats-text {
            margin-top: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Game Interface --- */
        #game-interface {
            display: none; 
            width: 100%;
            height: 100%;
        }

        #viewWrap {
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="gemini-header">Gemini Processing...</div>
        <div class="progress-wrapper">
            <div id="custom-progress-bar"></div>
        </div>
        <div id="loading-stats" class="stats-text">Initializing Environment... [0%]</div>
    </div>

    <div id="game-interface">
        <div id="viewWrap">
            <iframe 
                id="gameFrame" 
                src="https://baldis-basics-online.github.io/file/" 
                allowfullscreen 
                sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock">
            </iframe>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('loading-overlay');
        const bar = document.getElementById('custom-progress-bar');
        const stats = document.getElementById('loading-stats');
        const gameInterface = document.getElementById('game-interface');

        let progress = 0;
        const totalTime = 5000; // 5 seconds
        const intervalTime = 100;

        function startLoading() {
            const timer = setInterval(() => {
                progress += (100 / (totalTime / intervalTime));
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    stats.textContent = "SYNCHRONIZATION COMPLETE.";
                    
                    setTimeout(() => {
                        overlay.style.opacity = "0";
                        gameInterface.style.display = "block";
                        setTimeout(() => {
                            overlay.style.display = "none";
                        }, 800);
                    }, 500);
                } else {
                    bar.style.width = progress + "%";
                    stats.textContent = `FETCHING ASSETS... [${Math.round(progress)}%]`;
                }
            }, intervalTime);
        }

        // Pointer Lock remains so you can play with the mouse correctly
        document.getElementById('viewWrap').addEventListener('click', function() {
            if (this.requestPointerLock) {
                this.requestPointerLock();
            }
        });

        window.onload = startLoading;
    </script>
</body>
</html>
