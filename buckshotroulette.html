<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/buckshot-roulette/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Buckshot Roulette | Gemini System</title>
    <link rel="stylesheet" href="style.css">
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="buckshot-roulette.icon.png" />
    <link rel="apple-touch-icon" href="buckshot-roulette.apple-touch-icon.png" />
    <style>
        /* --- Gemini Loading Overlay (FNAE Look) --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .gemini-header {
            font-size: 18px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ffffff;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        }

        .progress-wrapper {
            width: 300px;
            padding: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            border: 1px solid #333;
        }

        #custom-progress-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #444, #bbb);
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
            transition: width 0.2s ease;
        }

        .stats-text {
            margin-top: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Hide the original Godot status elements but keep them for logic */
        #status { visibility: hidden; position: absolute; }
        #canvas { background-color: #000; }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="gemini-header">Gemini Processing...</div>
        <div class="progress-wrapper">
            <div id="custom-progress-bar"></div>
        </div>
        <div id="loading-stats" class="stats-text">Initializing Gamble... [0%]</div>
    </div>

    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>
    
    <div id="status">
        <img id="status-splash" src="buckshot-roulette.png" alt="">
        <progress id="status-progress"></progress>
        <div id="status-notice"></div>
    </div>

    <script src="main.js"></script>
    <script src="buckshot-roulette.js"></script>
    <script>
        const GODOT_CONFIG = {
            "args": [],
            "canvasResizePolicy": 2,
            "ensureCrossOriginIsolationHeaders": false,
            "executable": "buckshot-roulette",
            "experimentalVK": false,
            "fileSizes": {
                "buckshot-roulette.pck": 344705792,
                "buckshot-roulette.wasm": 43444261
            },
            "focusCanvas": false,
            "gdextensionLibs": []
        };
        const GODOT_THREADS_ENABLED = false;
        const engine = new Engine(GODOT_CONFIG);

        // Gemini UI Elements
        const overlay = document.getElementById('loading-overlay');
        const customBar = document.getElementById('custom-progress-bar');
        const statsText = document.getElementById('loading-stats');

        function run() {
            const statusNotice = document.getElementById('status-notice');
            
            function setStatusMode(mode) {
                if (mode === 'hidden') {
                    statsText.textContent = "DEALER READY.";
                    setTimeout(() => {
                        overlay.style.opacity = "0";
                        setTimeout(() => overlay.remove(), 800);
                    }, 500);
                }
            }

            function displayFailureNotice(err) {
                statsText.style.color = "#ff4444";
                statsText.textContent = "CRITICAL ERROR: " + (err.message || err);
            }

            const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
            
            if (missing.length !== 0) {
                displayFailureNotice("Missing browser features.");
            } else {
                engine.startGame({
                    'onProgress': function (current, total) {
                        if (current > 0 && total > 0) {
                            let percentage = Math.round((current / total) * 100);
                            customBar.style.width = percentage + "%";
                            statsText.textContent = `Loading Shells... [${percentage}%]`;
                        }
                    },
                }).then(() => {
                    setStatusMode('hidden');
                }, displayFailureNotice);
            }
        }

        window.godotRunStart = run;
    </script>
</body>
</html>
