<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Gemini System | Ragdoll Playground</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        
        #game-container { position: relative; width: 100%; height: 100%; }

        /* Gemini Loading Overlay */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease-in-out;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pulsing Gemini Header */
        .gemini-header {
            font-size: 18px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ffffff;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        }

        /* Sleek Progress Wrapper */
        .progress-wrapper {
            width: 300px;
            padding: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            border: 1px solid #333;
        }

        #custom-progress-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #444, #bbb);
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
            transition: width 0.1s linear;
        }

        .stats-text {
            margin-top: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #666;
            letter-spacing: 1px;
        }

        iframe { border: none; width: 100%; height: 100%; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="loading-overlay">
        <div class="gemini-header">Gemini Processing...</div>
        <div class="progress-wrapper">
            <div id="custom-progress-bar"></div>
        </div>
        <div id="loading-stats" class="stats-text">ESTABLISHING SECURE CONNECTION...</div>
    </div>

    <iframe id="game-frame" 
        src="https://game.azgame.io/ragdoll-playground/" 
        allow="autoplay; fullscreen; gamepad" 
        allowfullscreen="true">
    </iframe>
</div>

<script>
    const loader = document.getElementById('loading-overlay');
    const progressBar = document.getElementById('custom-progress-bar');
    const statsText = document.getElementById('loading-stats');
    const frame = document.getElementById('game-frame');

    let progress = 0;
    const duration = 5000; // 5 seconds to match your original timing
    const intervalTime = 50; 
    const increment = (intervalTime / duration) * 100;

    // Simulate progress while the frame loads
    const progressInterval = setInterval(() => {
        if (progress < 95) { // Hold at 95% until iframe is officially ready
            progress += increment;
            progressBar.style.width = progress + "%";
            
            if(progress > 30) statsText.textContent = "INITIALIZING PHYSICS ENGINE...";
            if(progress > 70) statsText.textContent = "SYNCHRONIZING ENTITIES...";
        }
    }, intervalTime);

    frame.onload = function() {
        // Once the frame reports it's loaded, finish the bar and hide overlay
        setTimeout(() => {
            progress = 100;
            progressBar.style.width = "100%";
            statsText.textContent = "SYSTEM READY.";
            
            setTimeout(() => {
                loader.classList.add('hidden');
                clearInterval(progressInterval);
                frame.focus();
            }, 500); // Short delay for user to see "System Ready"
        }, 5000); // Maintaining your original 5-second delay to cover watermarks
    };
</script>

</body>
</html>
