<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Gemini System | CS Surf</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        
        #game-container { position: relative; width: 100%; height: 100%; }

        /* Gemini Loading Overlay */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease-in-out;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pulsing Gemini Header */
        .gemini-header {
            font-size: 18px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ffffff;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        }

        /* Sleek Progress Wrapper */
        .progress-wrapper {
            width: 300px;
            padding: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            border: 1px solid #333;
        }

        #custom-progress-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #444, #bbb);
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
            transition: width 0.1s linear;
        }

        .stats-text {
            margin-top: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        iframe { border: none; width: 100%; height: 100%; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="loading-overlay">
        <div class="gemini-header">Gemini Processing...</div>
        <div class="progress-wrapper">
            <div id="custom-progress-bar"></div>
        </div>
        <div id="loading-stats" class="stats-text">Initializing Systems...</div>
    </div>

    <iframe id="game-frame" 
        src="https://html-classic.itch.zone/html/9924566-1082017/index.html" 
        allow="autoplay; fullscreen; gamepad" 
        allowfullscreen="true">
    </iframe>
</div>

<script>
    const loader = document.getElementById('loading-overlay');
    const progressBar = document.getElementById('custom-progress-bar');
    const statsText = document.getElementById('loading-stats');
    const frame = document.getElementById('game-frame');

    // 10 Second Loading Configuration
    const totalTime = 10000; 
    const intervalTick = 100; 
    let currentTime = 0;

    function startLoading() {
        const loadingInterval = setInterval(() => {
            currentTime += intervalTick;
            let percent = (currentTime / totalTime) * 100;

            if (percent >= 100) {
                percent = 100;
                clearInterval(loadingInterval);
                statsText.textContent = "System Ready.";
                
                setTimeout(() => {
                    loader.classList.add('hidden');
                    frame.focus();
                }, 500);
            } else {
                progressBar.style.width = percent + "%";
                
                // Status text updates
                if (percent < 25) statsText.textContent = "Connecting to Gemini Core...";
                else if (percent < 50) statsText.textContent = "Allocating Memory Blocks...";
                else if (percent < 75) statsText.textContent = "Syncing Asset Data...";
                else statsText.textContent = "Finalizing Secure Link...";
            }
        }, intervalTick);
    }

    // Start the 10-second timer as soon as the frame begins loading
    frame.onload = function() {
        startLoading();
    };
</script>

</body>
</html>
